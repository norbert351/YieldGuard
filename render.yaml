services:
  - type: web
    name: yieldguard-api
    runtime: node
    plan: starter
    buildCommand: npm install --legacy-peer-deps
    startCommand: node dist/main.js
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: PORT
        value: '4000'
      - key: X_LAYER_RPC
        sync: false
      - key: YIELDGUARD_WALLET_PK
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
    healthCheckPath: /api/simulation
    autoDeploy: true
