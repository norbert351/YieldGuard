services:
  - type: web
    name: yieldguard-api
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: PORT
        value: '4000'
      - key: MAINNET_RPC_URL
        sync: false
      - key: MAINNET_VAULT_ADDRESS
        sync: false
      - key: YIELDGUARD_WALLET_PK
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
    healthCheckPath: /api/simulation
    autoDeploy: true
